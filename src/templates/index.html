<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MindClear</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; max-width: 500px; margin: 40px auto; text-align: center; }
        .conselho { font-style: italic; color: #555; margin-bottom: 20px; padding: 10px; background: #f9f9f9; border-left: 4px solid #4CAF50;}
        .tarefa { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .concluida { text-decoration: line-through; color: gray; }
        button { background: #4CAF50; color: white; border: none; padding: 8px 12px; cursor: pointer; }
        .btn-concluir { background: #2196F3; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Descarregue sua mente</h1>
    
    <div class="conselho">"{{ conselho }}"</div>

    <form action="{{ url_for('adicionar') }}" method="POST">
        <input type="text" name="descricao" placeholder="Nova tarefa..." required size="30">
        <button type="submit">Adicionar Tarefa</button>
    </form>

    <div style="margin-top: 20px; text-align: left;">
        {% for t in tarefas %}
            <div class="tarefa">
                <span class="{% if t.concluida %}concluida{% endif %}">
                    {{ t.id }} - {{ t.descricao }}
                </span>
                {% if not t.concluida %}
                    <a href="{{ url_for('concluir', id_tarefa=t.id) }}">
                        <button class="btn-concluir">Concluir</button>
                    </a>
                {% endif %}
            </div>
        {% else %}
            <p style="text-align:center;">Nenhuma pendência. Mente limpa!</p>
        {% endfor %}
    </div>
</body>
</html>
